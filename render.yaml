services:
  - type: web
    name: suvarna
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: suvarna-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: suvarna-db
    databaseName: suvarna
    plan: free
